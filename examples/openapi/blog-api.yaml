openapi: 3.1.0
info:
  title: OpenModels Blog Example
  version: 0.1.0
paths: {}
components:
  schemas:
    PostStatus:
      type: string
      enum:
        - draft
        - published
        - archived
    UserCreateInput:
      type: object
      additionalProperties: false
      required:
        - email
        - displayName
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        password:
          type: string
          minLength: 12
    UserResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - email
        - displayName
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time
    PostCreateInput:
      type: object
      additionalProperties: false
      required:
        - title
        - body
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/PostStatus"
    PostResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - authorId
        - title
        - body
        - status
        - slug
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        status:
          $ref: "#/components/schemas/PostStatus"
        slug:
          type: string
        createdAt:
          type: string
          format: date-time
x-openmodels:
  version: "0.1"
  outputs:
    - target: drizzle-pg
      filename: blog-schema.ts
    - target: seaorm-rust
      options:
        moduleRoot: seaorm-entity
  enums:
    PostStatus:
      schema:
        create: "#/components/schemas/PostStatus"
        read: "#/components/schemas/PostStatus"
      description: Lifecycle state for a blog post
      values:
        - draft
        - published
        - archived
  entities:
    User:
      table: users
      sourceSchemas:
        create: "#/components/schemas/UserCreateInput"
        read: "#/components/schemas/UserResponse"
      fields:
        id:
          schema:
            read: "#/components/schemas/UserResponse/properties/id"
          column:
            type: uuid
            primaryKey: true
            generated: database
        email:
          schema:
            create: "#/components/schemas/UserCreateInput/properties/email"
            read: "#/components/schemas/UserResponse/properties/email"
          column:
            type: varchar
            length: 255
            unique: true
            nullable: false
        displayName:
          schema:
            create: "#/components/schemas/UserCreateInput/properties/displayName"
            read: "#/components/schemas/UserResponse/properties/displayName"
          column:
            type: varchar
            length: 120
            nullable: false
        passwordHash:
          column:
            type: varchar
            length: 255
            nullable: false
        createdAt:
          schema:
            read: "#/components/schemas/UserResponse/properties/createdAt"
          column:
            type: timestamptz
            generated: database
      relations:
        posts:
          kind: hasMany
          target: Post
          foreignKey: authorId
      indexes:
        - name: users_email_key
          fields:
            - email
          unique: true
      constraints:
        - name: users_email_unique
          kind: unique
          fields:
            - email
    Post:
      table: posts
      sourceSchemas:
        create: "#/components/schemas/PostCreateInput"
        read: "#/components/schemas/PostResponse"
      fields:
        id:
          schema:
            read: "#/components/schemas/PostResponse/properties/id"
          column:
            type: uuid
            primaryKey: true
            generated: database
        authorId:
          schema:
            read: "#/components/schemas/PostResponse/properties/authorId"
          column:
            type: uuid
            nullable: false
        title:
          schema:
            create: "#/components/schemas/PostCreateInput/properties/title"
            read: "#/components/schemas/PostResponse/properties/title"
          column:
            type: varchar
            length: 200
            nullable: false
        body:
          schema:
            create: "#/components/schemas/PostCreateInput/properties/body"
            read: "#/components/schemas/PostResponse/properties/body"
          column:
            type: text
            nullable: false
        status:
          schema:
            create: "#/components/schemas/PostCreateInput/properties/status"
            read: "#/components/schemas/PostResponse/properties/status"
          enum: PostStatus
          column:
            type: varchar
            length: 32
            nullable: false
            default: draft
        slug:
          schema:
            read: "#/components/schemas/PostResponse/properties/slug"
          column:
            type: varchar
            length: 240
            nullable: false
            generated: application
          adapters:
            drizzle-pg:
              chain:
                - ".$type<string>()"
          computed:
            expression: slugify(title)
            stored: true
            dependsOn:
              - title
        createdAt:
          schema:
            read: "#/components/schemas/PostResponse/properties/createdAt"
          column:
            type: timestamptz
            generated: database
      relations:
        author:
          kind: belongsTo
          target: User
          foreignKey: authorId
      indexes:
        - name: posts_author_created_at_idx
          fields:
            - authorId
            - createdAt
      constraints:
        - name: posts_author_fk
          kind: foreignKey
          fields:
            - authorId
          references:
            entity: User
            fields:
              - id
            onDelete: cascade
            onUpdate: cascade
        - name: posts_slug_nonempty
          kind: check
          expression: "slug <> ''"
